<svg width="800" height="2400" viewBox="0 0 800 2400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <mask id="mask-retro-sage-3">
      <rect width="100%" height="100%" fill="white"/>
      <rect x="80" y="230" width="640" height="500" fill="black" rx="0"/>
<rect x="80" y="770" width="640" height="500" fill="black" rx="0"/>
<rect x="80" y="1310" width="640" height="500" fill="black" rx="0"/>
    </mask>
  </defs>
  <g mask="url(#mask-retro-sage-3)">
    
      <rect width="100%" height="100%" fill="#EAE6DF"/>
      <!-- Newspaper background lines -->
      <line x1="40" y1="20" x2="760" y2="20" stroke="#2C3E50" stroke-width="4"/>
      <line x1="40" y1="35" x2="760" y2="35" stroke="#2C3E50" stroke-width="1.5"/>
    
  </g>
  
      <!-- Headline banner at top -->
      <rect x="40" y="55" width="720" height="100" fill="#C0392B"/>
      <text x="400" y="120" text-anchor="middle" font-family="'Impact', Arial Black, sans-serif" font-size="52" fill="white" letter-spacing="4">BREAKING NEWS</text>
      
      <!-- Sub-banners -->
      <rect x="40" y="165" width="220" height="30" fill="#2C3E50"/>
      <text x="150" y="186" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="16" fill="white">DAILY REPORT</text>
      <text x="650" y="186" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="16" fill="#2C3E50">BALI EDITION</text>
      <line x1="40" y1="205" x2="760" y2="205" stroke="#2C3E50" stroke-width="3"/>

      <!-- Slot Borders -->
      
        <rect x="80" y="230" width="640" height="500" fill="none" stroke="#2C3E50" stroke-width="5"/>
        <rect x="85" y="235" width="630" height="490" fill="none" stroke="white" stroke-width="2"/>
      

        <rect x="80" y="770" width="640" height="500" fill="none" stroke="#2C3E50" stroke-width="5"/>
        <rect x="85" y="775" width="630" height="490" fill="none" stroke="white" stroke-width="2"/>
      

        <rect x="80" y="1310" width="640" height="500" fill="none" stroke="#2C3E50" stroke-width="5"/>
        <rect x="85" y="1315" width="630" height="490" fill="none" stroke="white" stroke-width="2"/>
      

      <!-- Megaphone Sticker at bottom-left -->
      <g transform="translate(60, 2160) scale(1.1)">
        <path d="M 30,50 L 70,30 L 70,70 Z" fill="#F39C12" stroke="#2C3E50" stroke-width="3"/>
        <ellipse cx="70" cy="50" rx="10" ry="20" fill="#E67E22" stroke="#2C3E50" stroke-width="3"/>
        <rect x="15" y="45" width="20" height="25" rx="5" fill="#BDC3C7" stroke="#2C3E50" stroke-width="3" transform="rotate(15 25 55)"/>
        <path d="M 70,40 Q 95,40 90,50 Q 95,60 70,60" fill="none" stroke="#2C3E50" stroke-width="3" stroke-linecap="round"/>
        <text x="105" y="55" font-family="'Impact', sans-serif" font-size="28" fill="#C0392B" transform="rotate(-10)">LOL!</text>
      </g>

      <!-- Magnifying Glass sticker -->
      <g transform="translate(640, 230) scale(0.9)">
        <circle cx="50" cy="50" r="25" fill="#AED6F1" stroke="#2C3E50" stroke-width="4" opacity="0.8"/>
        <circle cx="50" cy="50" r="25" fill="none" stroke="#2C3E50" stroke-width="4"/>
        <line x1="68" y1="68" x2="95" y2="95" stroke="#2C3E50" stroke-width="8" stroke-linecap="round"/>
        <circle cx="42" cy="42" r="8" fill="white" opacity="0.6"/>
      </g>

      <!-- Hot Gossip speech bubble -->
      <g transform="translate(630, 1080)">
        <rect x="0" y="0" width="130" height="50" rx="15" fill="white" stroke="#2C3E50" stroke-width="3"/>
        <polygon points="20,50 30,65 40,50" fill="white" stroke="#2C3E50" stroke-width="3"/>
        <polygon points="20,48 30,60 40,48" fill="white"/>
        <text x="65" y="32" text-anchor="middle" font-family="'Comic Sans MS', cursive, sans-serif" font-weight="bold" font-size="14" fill="#2C3E50">HOT GOSSIP!</text>
      </g>

      <!-- Bottom news ticker -->
      <rect x="40" y="2290" width="720" height="50" fill="#2C3E50"/>
      <text x="60" y="2322" font-family="monospace" font-weight="bold" font-size="18" fill="#F1C40F">BALISNAP NEWS: UNBELIEVABLY ESTHETIC PEEPS SPOTTED! DETAILED VISUALS CONFIRMED...</text>
    
  
</svg>